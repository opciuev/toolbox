<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 动态背景粒子 */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* 标题区域 */
        .hero {
            text-align: center;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(120, 100, 255, 0.5);
            margin-bottom: 0.6rem;
        }

        .hero p {
            color: rgba(255,255,255,0.45);
            font-size: 1rem;
        }

        /* 入口卡片列表 */
        .entries {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 680px;
        }

        .entry-card {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 1.8rem 2rem;
            border-radius: 20px;
            text-decoration: none;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.35s ease;
            cursor: pointer;
        }

        .entry-card:hover {
            transform: translateX(6px) scale(1.01);
        }

        /* 工具箱卡片 */
        .card-tools {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.35);
        }

        .card-tools:hover {
            box-shadow: 0 32px 80px rgba(102, 126, 234, 0.55);
        }

        /* 学习卡片 */
        .card-learn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 20px 60px rgba(56, 239, 125, 0.25);
        }

        .card-learn:hover {
            box-shadow: 0 32px 80px rgba(56, 239, 125, 0.45);
        }

        /* 卡片内光晕装饰 */
        .entry-card::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        .entry-card::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: 20px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .card-icon {
            font-size: 2.6rem;
            flex-shrink: 0;
            margin-right: 1.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .card-body {
            flex: 1;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            margin-bottom: 0.3rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.4rem;
            line-height: 1.2;
        }

        .card-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.72);
            line-height: 1.5;
        }

        .card-arrow {
            display: flex;
            align-items: center;
            margin-left: 1.5rem;
            flex-shrink: 0;
            color: rgba(255,255,255,0.7);
            transition: transform 0.2s ease;
        }

        .entry-card:hover .card-arrow {
            transform: translateX(4px);
        }

        .card-arrow svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 底部 */
        .footer {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 2rem; }
            .entry-card { padding: 1.4rem 1.2rem; }
            .card-icon { font-size: 2rem; margin-right: 1rem; }
        }
    </style>
</head>
<body>
    <canvas class="bg-canvas" id="bgCanvas"></canvas>

    <div class="page">
        <div class="hero">
            <h1>我的工作台</h1>
            <p>选择你想进入的区域</p>
        </div>

        <div class="entries">
            <!-- 学习入口 -->
            <a href="opencv/index.html" class="entry-card card-learn">
                <span class="card-icon">👁️</span>
                <div class="card-body">
                    <div class="card-label">Learning</div>
                    <div class="card-title">OpenCV 学习笔记</div>
                    <div class="card-desc">图像创意 · 迈向 AI 视觉王者归来，系统整理的章节笔记与代码示例</div>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>

            <!-- 通用工具入口 -->
            <a href="index.html" class="entry-card card-tools">
                <span class="card-icon">🛠️</span>
                <div class="card-body">
                    <div class="card-label">Toolbox</div>
                    <div class="card-title">通用工具集合</div>
                    <div class="card-desc">随机生成、文本处理、数据转换、开发辅助等 25+ 种实用在线工具</div>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>
        </div>

        <div class="footer">© 2026 我的工作台</div>
    </div>

    <script>
        // 粒子背景
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 18000);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 160, 255, ${p.alpha})`;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { resize(); initParticles(); });
        resize();
        initParticles();
        draw();
    </script>
</body>
</html>
